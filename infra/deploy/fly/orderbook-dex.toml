app = "cel-orderbook-dex"
primary_region = "sin"

[build]
  dockerfile = "../Dockerfile.go-service"
  [build.args]
    SERVICE = "orderbook-dex"

[env]
  ORDERBOOK_DEX_HTTP_PORT = "8084"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8084
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
