app = "cel-matching"
primary_region = "sin"

[build]
  dockerfile = "../Dockerfile.go-service"
  [build.args]
    SERVICE = "matching-engine"

[env]
  MATCHING_ENGINE_HTTP_PORT = "8083"
  MATCHING_SEED_BOOKS = "true"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8083
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
