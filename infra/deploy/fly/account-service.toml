# fly launch --copy-config infra/deploy/fly/account-service.toml --name cel-account
app = "cel-account"
primary_region = "sin"

[build]
  dockerfile = "../Dockerfile.go-service"
  [build.args]
    SERVICE = "account-service"

[env]
  ACCOUNT_SERVICE_HTTP_PORT = "8081"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
