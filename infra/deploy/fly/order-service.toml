app = "cel-order"
primary_region = "sin"

[build]
  dockerfile = "../Dockerfile.go-service"
  [build.args]
    SERVICE = "order-service"

[env]
  ORDER_SERVICE_HTTP_PORT = "8082"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
