# Scrape Go services on the host (run backends with make run-*).
# Docker Prometheus uses host.docker.internal (Linux: host-gateway in compose).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cel-go-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8081 # account-service
          - host.docker.internal:8082 # order-service
          - host.docker.internal:8083 # matching-engine
          - host.docker.internal:8084 # orderbook-dex
          - host.docker.internal:8085 # hyperliquid-engine
          - host.docker.internal:8086 # risk-engine
          - host.docker.internal:8087 # liquidation-engine
          - host.docker.internal:8088 # funding-engine
          - host.docker.internal:8089 # rpc-gateway
          - host.docker.internal:8090 # indexer
        labels:
          env: local
